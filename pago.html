<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACC - PAGO</title>
    <link rel="icon" href="img/Logo.webp">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="pago.css">
</head>
<body>

<header class="menu">
    <nav>
        <a href="index.html">INICIO</a>
        <a href="invitados.html">INVITADOS</a>
        <a href="actividades.html">ACTIVIDADES</a>
        <a href="entradas.html">ENTRADAS</a>
        <a href="contacto.html">CONTACTO/FAQ</a>
        <a href="carrito.html">🛒</a>
    </nav>
</header>

<div class="site-header">
    <img class="icon" src="img/Logo.webp" alt="Logo Comic Con Argentina">
    <div class="Comicconheader">
        <h1>COMIC CON</h1>
        <h2>ARGENTINA 2026</h2>
    </div>
</div>

<hr class="espacio">

<main>

    <div class="pago-wrapper" id="seccion-pago">
        <h2 class="section-title">DATOS DE PAGO</h2>
        <div class="resumen-mini" id="resumen-mini"></div>
        <form class="formulario-pago" id="formulario-pago">

            <div class="grupo">
                <h3 class="subtitulo">DATOS PERSONALES</h3>
                <div class="fila-doble">
                    <div class="campo">
                        <label for="nombre">Nombre y apellido</label>
                        <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
                    </div>
                    <div class="campo">
                        <label for="dni">DNI</label>
                        <input type="text" id="dni" placeholder="Ej: 38123456" required maxlength="8">
                    </div>
                </div>
                <div class="campo">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Ej: juan@mail.com" required>
                </div>
                <div class="campo">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" placeholder="Ej: Av. Corrientes 1234, CABA" required>
                </div>
            </div>

            <div class="grupo">
                <h3 class="subtitulo">DATOS DE TARJETA</h3>
                <div class="campo">
                    <label for="tarjeta">Número de tarjeta</label>
                    <input type="text" id="tarjeta" placeholder="1234 5678 9012 3456" required maxlength="19">
                </div>
                <div class="fila-doble">
                    <div class="campo">
                        <label for="vencimiento">Vencimiento</label>
                        <input type="text" id="vencimiento" placeholder="MM/AA" required maxlength="5">
                    </div>
                    <div class="campo">
                        <label for="cvv">CVV</label>
                        <input type="text" id="cvv" placeholder="123" required maxlength="3">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-pagar">CONFIRMAR PAGO</button>

        </form>
    </div>

    <div class="exito-wrapper" id="seccion-exito" style="display:none;">
        <div class="exito-icono">✅</div>
        <h2 class="exito-titulo">¡COMPRA EXITOSA!</h2>
        <p class="exito-texto">Gracias, <strong id="exito-nombre"></strong>. Tu compra fue procesada correctamente.</p>
        <p class="exito-texto">Te enviamos la confirmación a <strong id="exito-email"></strong>.</p>
        <div class="exito-resumen" id="exito-resumen"></div>
        <a href="index.html" class="btn-volver">VOLVER AL INICIO</a>
    </div>

    <hr class="espacio">
</main>

<footer class="footer">
    <div class="footer-contenido">
        <div class="footer-izq">
            <p class="cierre">SEGUINOS EN REDES</p>
            <div class="redes">
                <a href="https://www.instagram.com/argcomiccon/"><img src="img/instagram.png" alt="Instagram"></a>
                <a href="https://x.com/ArgComicCon"><img src="img/twitter.png" alt="Twitter"></a>
                <a href="https://www.youtube.com/channel/UCq43u4Pc0iYq14YmzzL0V6Q"><img src="img/youtube.png" alt="YouTube"></a>
                <a href="https://www.tiktok.com/@argcomiccon"><img src="img/tiktok.png" alt="TikTok"></a>
            </div>
        </div>
        <div class="linea-footer"></div>
        <div class="footer-der">
            <p class="cierre">NOTIFICACIONES</p>
            <form class="formulario">
                <input type="email" placeholder="Tu email" required>
                <button class="submit" type="submit">SUSCRIBIRME</button>
            </form>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="pago.js"></script>
</body>
</html>
